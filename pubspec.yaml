name: home_inventory
description: "A home inventory app to track household products across rooms."
publish_to: 'none'
version: 0.1.4+104

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  shared_preferences: ^2.5.3
  intl: any
  supabase_flutter: ^2.8.4
  package_info_plus: ^8.3.0
  http: ^1.3.0
  http_parser: ^4.0.0
  url_launcher: ^6.3.1
  mobile_scanner: ^6.0.6
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  generate: true

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "icon.png"
  adaptive_icon_foreground: "icon.png"
  adaptive_icon_background: "#1A3A5C"
  adaptive_icon_foreground_inset: 0
